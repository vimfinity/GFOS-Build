<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GFOS Build UI Readiness Pack</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <img src="../../assets/GFOS_Logo_with_text.svg" alt="GFOS" class="logo" />
      <div>
        <h1>UI Readiness Pack</h1>
        <p>Reference surface for upcoming Next.js + Fumadocs implementation.</p>
      </div>
    </header>

    <main>
      <section class="panel controls">
        <label for="report-select">Run Report</label>
        <select id="report-select"></select>
      </section>

      <section class="grid">
        <article class="panel">
          <h2>Run Summary</h2>
          <dl id="summary"></dl>
        </article>

        <article class="panel">
          <h2>Events</h2>
          <ul id="events"></ul>
        </article>

        <article class="panel wide">
          <h2>Build / Pipeline Details</h2>
          <pre id="details"></pre>
        </article>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
