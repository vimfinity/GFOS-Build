name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: bun install

      - name: Validate codebase
        run: |
          bun run check
          bun run check:desktop

      - name: Validate release version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_paths=(
            "package.json"
            "apps/cli/package.json"
            "apps/desktop/package.json"
          )

          for package_path in "${package_paths[@]}"; do
            package_version="$(node -p "require('./${package_path}').version")"

            if [[ "$tag_version" != "$package_version" ]]; then
              echo "Tag/package version mismatch: tag=$tag_version package=$package_path version=$package_version" >&2
              exit 1
            fi
          done

      - name: Build Windows desktop release
        run: bun run dist:desktop:win

      - name: Smoke test packaged Windows app
        run: bun run smoke:desktop

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GFOS Build ${{ github.ref_name }}"
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            release/desktop/*.zip
            release/desktop/managed/*.exe
            release/desktop/managed/*.blockmap
            release/desktop/managed/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
