name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Node.js (for electron-rebuild)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install
        # note: gui/package.json postinstall runs electron-rebuild automatically

      - name: Validate codebase
        run: |
          bun run check
          bun run check:desktop

      - name: Validate release version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          root_version="$(node -p "require('./package.json').version")"
          gui_version="$(node -p "require('./gui/package.json').version")"

          if [[ "$tag_version" != "$root_version" || "$tag_version" != "$gui_version" ]]; then
            echo "Tag/package version mismatch: tag=$tag_version root=$root_version gui=$gui_version" >&2
            exit 1
          fi

      - name: Build Windows desktop release
        run: bun run dist:desktop:win

      - name: Smoke test packaged Windows app
        run: bun run smoke:desktop

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GFOS Build ${{ github.ref_name }}"
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            release/desktop/*.zip
            release/desktop/managed/*.exe
            release/desktop/managed/*.blockmap
            release/desktop/managed/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
