name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js (for electron-rebuild)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install

      - name: Rebuild native modules for Electron
        working-directory: gui
        run: bun run rebuild:native

      - name: Build server bundle
        run: bun run build:server

      - name: Compile server binary (Windows x64)
        run: bun run binary:build:win

      - name: Build Electron renderer + main
        working-directory: gui
        run: bun run build

      - name: Package Electron app
        run: node gui/scripts/package-win.mjs

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "release\gui\GFOS Build-win32-x64" `
            -DestinationPath "release\GFOS-Build-${{ github.ref_name }}-win32-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GFOS Build ${{ github.ref_name }}"
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: release/GFOS-Build-${{ github.ref_name }}-win32-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
