appId: com.gfos.gfos-build
productName: GFOS Build

directories:
  output: ../release/desktop/managed

files:
  - out/**/*
  - package.json
  - node_modules/**/*
  - "!src{,/**}"
  - "!scripts{,/**}"
  - "!electron.vite.config.ts"
  - "!tsconfig*.json"
  - "!bun.lock"

extraResources:
  - from: ../assets
    to: assets
    filter:
      - icon.ico

npmRebuild: false
generateUpdatesFilesForAllChannels: true

publish:
  provider: github
  owner: vimfinity
  repo: GFOS-Build
  releaseType: prerelease

win:
  icon: ../assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: GFOS-Build-Setup-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
